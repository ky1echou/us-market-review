# us-market-review 默认配置
# 所有字段均可直接编辑；无需维护 JSON。

app:
  timezone: Asia/Shanghai
  output_dir: reports
  report_language: zh-CN

market:
  # 完整报告不做核心版/简版。数据源按路由补齐完整股票池，不通过删标的绕过失败。
  market_data_provider_order:
    - fmp
    - finnhub
    - twelve_data
    - yfinance
    - cache
  provider_chain:
    - fmp
    - finnhub
    - twelve_data
    - yfinance
    - cache

  # 按标的路由，避免把 FMP 已知 402/权限不足的 ETF、SaaS、宏观资产反复优先请求到 FMP。
  provider_routing:
    default: [fmp, finnhub, twelve_data, yfinance, cache]
    NVDA: [fmp, finnhub, twelve_data, yfinance, cache]
    MSFT: [fmp, finnhub, twelve_data, yfinance, cache]
    AAPL: [fmp, finnhub, twelve_data, yfinance, cache]
    AMZN: [fmp, finnhub, twelve_data, yfinance, cache]
    GOOGL: [fmp, finnhub, twelve_data, yfinance, cache]
    META: [fmp, finnhub, twelve_data, yfinance, cache]
    TSLA: [fmp, finnhub, twelve_data, yfinance, cache]
    AMD: [fmp, finnhub, twelve_data, yfinance, cache]
    QQQ: [finnhub, twelve_data, yfinance, cache]
    DIA: [finnhub, twelve_data, yfinance, cache]
    IWM: [finnhub, twelve_data, yfinance, cache]
    SMH: [finnhub, twelve_data, yfinance, cache]
    SOXX: [finnhub, twelve_data, yfinance, cache]
    XLK: [finnhub, twelve_data, yfinance, cache]
    XLF: [finnhub, twelve_data, yfinance, cache]
    XLE: [finnhub, twelve_data, yfinance, cache]
    XLV: [finnhub, twelve_data, yfinance, cache]
    TLT: [finnhub, twelve_data, yfinance, cache]
    GLD: [finnhub, twelve_data, yfinance, cache]
    USO: [finnhub, twelve_data, yfinance, cache]
    CPER: [finnhub, twelve_data, yfinance, cache]
    AVGO: [finnhub, twelve_data, yfinance, cache]
    MU: [finnhub, twelve_data, yfinance, cache]
    MRVL: [finnhub, twelve_data, yfinance, cache]
    ARM: [finnhub, twelve_data, yfinance, cache]
    SNOW: [finnhub, twelve_data, yfinance, cache]
    NOW: [finnhub, twelve_data, yfinance, cache]
    US10Y: [twelve_data, finnhub, tlt_proxy, cache]
    DXY: [twelve_data, finnhub, uup_proxy, cache]
    UUP: [finnhub, twelve_data, cache]
    BTCUSD: [twelve_data, finnhub, yfinance, cache]

  provider_options:
    fmp:
      api_key_env: FMP_API_KEY
      base_url: https://financialmodelingprep.com/stable
      quote_batch_size: 80
      timeout: 12
      symbol_map:
        SPY: SPY
        QQQ: QQQ
        DIA: DIA
        IWM: IWM
        SMH: SMH
        SOXX: SOXX
        XLK: XLK
        XLF: XLF
        XLE: XLE
        XLV: XLV
        TLT: TLT
        GLD: GLD
        USO: USO
        CPER: CPER
        VIX: ^VIX
        US10Y: ^TNX
        DXY: DX-Y.NYB
        BTCUSD: BTCUSD
    finnhub:
      api_key_env: FINNHUB_API_KEY
      base_url: https://finnhub.io/api/v1
      timeout: 12
      symbol_map:
        VIX: ^VIX
        US10Y: ^TNX
        DXY: DXY
        UUP: UUP
        BTCUSD: BINANCE:BTCUSDT
    twelve_data:
      api_key_env: TWELVE_DATA_API_KEY
      base_url: https://api.twelvedata.com
      timeout: 12
      symbol_map:
        VIX: VIX
        US10Y: TNX
        DXY: DXY
        UUP: UUP
        BTCUSD: BTC/USD
    tlt_proxy:
      enabled: false
      proxy_ticker: TLT
      implemented_by: src.macro_proxy.apply_macro_proxies
      note: 10Y美债收益率数据暂缺，使用TLT观察长端利率方向。
    uup_proxy:
      enabled: false
      proxy_ticker: UUP
      implemented_by: src.macro_proxy.apply_macro_proxies
      note: 美元指数数据暂缺，使用UUP观察美元方向。
    stooq:
      enabled: false
      symbol_map:
        SPY: spy.us
        QQQ: qqq.us
        DIA: dia.us
        IWM: iwm.us
        SMH: smh.us
        SOXX: soxx.us
        XLK: xlk.us
        XLF: xlf.us
        XLE: xle.us
        XLV: xlv.us
        TLT: tlt.us
        GLD: gld.us
        USO: uso.us
        CPER: cper.us
        UUP: uup.us
        VIX: ^vix
        US10Y: 10usy.b
        DXY: dx.f
        BTCUSD: btcusd
    yfinance:
      symbol_map:
        VIX: ^VIX
        US10Y: ^TNX
        DXY: DX-Y.NYB
        UUP: UUP
        BTCUSD: BTC-USD
    alpha_vantage:
      api_key_env: ALPHA_VANTAGE_API_KEY
    polygon:
      api_key_env: POLYGON_API_KEY

  period: 90d
  warm_cache_period: 90d
  provider_check_period: 30d
  interval: 1d
  request_delay_sec: 0.5
  retry_count: 3
  retry_backoff_sec: 30.0
  provider_request_timeout_sec: 12
  per_ticker_timeout_sec: 60
  market_fetch_timeout_sec: 1200
  twelve_data_batch_size: 3
  twelve_data_batch_sleep_sec: 90
  twelve_data_retry_sleep_sec: 90

  cache_dir: data/processed/market_cache
  cache_snapshot_path: data/processed/market_cache.json
  latest_data_path: data/processed/latest_market_data.json
  latest_snapshot_max_age_minutes: 720
  cache_max_age_hours: 168
  cache_max_trading_days: 3

  min_success_ratio: 0.9
  live_min_success_ratio: 0.7
  cache_max_success_ratio: 0.3
  critical_groups:
    index_etf:
      min_success_ratio: 1.0
      tickers: [SPY, QQQ, DIA, IWM, SMH, SOXX, VIX]
    mega_tech:
      min_success_ratio: 1.0
      tickers: [NVDA, MSFT, AAPL, AMZN, GOOGL, META, TSLA]
    ai_semis:
      min_success_ratio: 0.8
      tickers: [AMD, AVGO, MU, MRVL, ARM]

  benchmarks:
    - {ticker: SPY, name: 标普500ETF, required: true}
    - {ticker: QQQ, name: 纳斯达克100ETF, required: true}
    - {ticker: DIA, name: 道琼斯ETF, required: true}
    - {ticker: IWM, name: 罗素2000ETF, required: true}
    - {ticker: SMH, name: 费城半导体/半导体ETF, required: true}
    - {ticker: SOXX, name: 半导体ETF, required: true}
    - {ticker: VIX, name: VIX波动率指数, required: true}

  sector_etfs:
    - {ticker: XLK, name: 科技ETF, required: true}
    - {ticker: XLF, name: 金融ETF, required: true}
    - {ticker: XLE, name: 能源ETF, required: true}
    - {ticker: XLV, name: 医疗ETF, required: true}

  key_stocks:
    - {ticker: NVDA, name: 英伟达, theme: AI算力, required: true}
    - {ticker: MSFT, name: 微软, theme: 云与AI应用, required: true}
    - {ticker: AAPL, name: 苹果, theme: 科技龙头/端侧AI, required: true}
    - {ticker: AMZN, name: 亚马逊, theme: 云计算/消费, required: true}
    - {ticker: GOOGL, name: Alphabet, theme: AI应用/云, required: true}
    - {ticker: META, name: Meta, theme: AI广告/大模型, required: true}
    - {ticker: TSLA, name: 特斯拉, theme: 电动车/机器人/自动驾驶, required: true}
    - {ticker: AMD, name: AMD, theme: AI芯片, required: true}
    - {ticker: AVGO, name: 博通, theme: AI网络/ASIC, required: true}
    - {ticker: MU, name: 美光, theme: AI存储/HBM, required: true}
    - {ticker: MRVL, name: Marvell, theme: AI网络/ASIC, required: true}
    - {ticker: ARM, name: Arm, theme: AI芯片IP, required: true}
    - {ticker: SNOW, name: Snowflake, theme: AI数据云, required: true}
    - {ticker: NOW, name: ServiceNow, theme: AI软件/SaaS, required: true}

  macro_assets:
    - {ticker: US10Y, name: 10Y美债收益率, theme: 利率, required: true}
    - {ticker: DXY, name: 美元指数, theme: 美元, required: true}
    - {ticker: UUP, name: 美元指数ETF(UUP代理), theme: 美元/代理, required: false}
    - {ticker: TLT, name: 长债ETF, theme: 利率/久期, required: true}
    - {ticker: GLD, name: 黄金ETF, theme: 黄金, required: true}
    - {ticker: USO, name: 原油ETF, theme: 原油, required: true}
    - {ticker: CPER, name: 铜ETF, theme: 铜, required: true}
    - {ticker: BTCUSD, name: 比特币, theme: 风险资产, required: true}

news:
  lookback_hours: 36
  max_items_per_feed: 20
  request_timeout_sec: 15
  user_agent: us-market-review/0.1
  feeds:
    - name: Yahoo Finance
      url: https://finance.yahoo.com/news/rssindex
    - name: CNBC Markets
      url: https://www.cnbc.com/id/100003114/device/rss/rss.html
    - name: CNBC Economy
      url: https://www.cnbc.com/id/20910258/device/rss/rss.html
    - name: MarketWatch Top Stories
      url: https://feeds.content.dowjones.io/public/rss/mw_topstories
    - name: Nasdaq Markets
      url: https://www.nasdaq.com/feed/rssoutbound?category=Markets

ah_mapping:
  - us_ticker: NVDA
    us_name: 英伟达
    theme: AI算力
    mapping_strength: 强映射
    a_h_mapping: 光模块、PCB、服务器、液冷、算力租赁、半导体设备
  - us_ticker: AMD
    us_name: AMD
    theme: AI芯片
    mapping_strength: 强映射
    a_h_mapping: GPU产业链、先进封装、服务器
  - us_ticker: AVGO
    us_name: 博通
    theme: AI网络/ASIC
    mapping_strength: 强映射
    a_h_mapping: 交换机、光通信、ASIC、PCB
  - us_ticker: MU
    us_name: 美光
    theme: AI存储/HBM
    mapping_strength: 强映射
    a_h_mapping: 存储、HBM、半导体材料设备
  - us_ticker: MRVL
    us_name: Marvell
    theme: AI网络/ASIC
    mapping_strength: 强映射
    a_h_mapping: 光通信、交换芯片、ASIC、PCB
  - us_ticker: MSFT
    us_name: 微软
    theme: 云与AI应用
    mapping_strength: 弱映射
    a_h_mapping: 云计算、软件、AI应用、数据中心
  - us_ticker: GOOGL
    us_name: Alphabet
    theme: AI应用/云
    mapping_strength: 弱映射
    a_h_mapping: AI应用、云计算、广告科技
  - us_ticker: META
    us_name: Meta
    theme: AI广告/大模型
    mapping_strength: 弱映射
    a_h_mapping: AI应用、广告科技、港股互联网情绪
  - us_ticker: TSLA
    us_name: 特斯拉
    theme: 电动车/机器人
    mapping_strength: 情绪映射
    a_h_mapping: 汽车零部件、机器人、智能驾驶、锂电

report:
  title: 中文美股复盘报告
  author: AI投研 · 美股版
  top_movers_count: 5
  include_raw_audit_section: false
  pdf:
    enabled: true
    wkhtmltopdf_path: ""
    min_bytes: 5000
