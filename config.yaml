# us-market-review 默认配置
# 所有字段均可直接编辑；无需维护 JSON。

app:
  timezone: Asia/Shanghai
  output_dir: reports
  report_language: zh-CN

market:
  # 行情源按顺序尝试：yfinance 失败后自动切到 Stooq，仍失败再使用本地缓存。
  # 后续可继续扩展 Twelve Data / Alpha Vantage / Polygon。
  provider_chain:
    - yfinance
    - stooq

  # 备用源代码映射。Stooq 对指数使用自己的代码，ETF/股票默认自动转为 xxx.us。
  provider_options:
    stooq:
      symbol_map:
        ^GSPC: ^spx
        ^IXIC: ^ndq
        ^DJI: ^dji
        ^RUT: ^rut
        ^SOX: ^sox
        ^VIX: ^vix
        BTC-USD: btcusd

  period: 90d
  interval: 1d

  # 减少限流：逐个 ticker 抓取，失败后切换备用源。
  request_delay_sec: 1.0
  retry_count: 1
  retry_backoff_sec: 4.0

  cache_dir: data/processed/market_cache
  cache_max_age_hours: 168

  # 实时行情成功率低于该阈值时，不生成正式 PDF，只推送失败提示。
  min_success_ratio: 0.7

  benchmarks:
    - ticker: ^GSPC
      name: 标普500
    - ticker: ^IXIC
      name: 纳斯达克综合
    - ticker: ^DJI
      name: 道琼斯工业
    - ticker: ^RUT
      name: 罗素2000
    - ticker: ^SOX
      name: 费城半导体
    - ticker: ^VIX
      name: VIX波动率

  sector_etfs:
    - ticker: SPY
      name: 标普500ETF
    - ticker: QQQ
      name: 纳斯达克100ETF
    - ticker: IWM
      name: 罗素2000ETF
    - ticker: XLK
      name: 科技
    - ticker: XLC
      name: 通信服务
    - ticker: XLY
      name: 可选消费
    - ticker: XLF
      name: 金融
    - ticker: XLV
      name: 医疗保健
    - ticker: XLI
      name: 工业
    - ticker: XLE
      name: 能源
    - ticker: XLB
      name: 材料
    - ticker: XLP
      name: 必需消费
    - ticker: XLU
      name: 公用事业
    - ticker: XLRE
      name: 房地产
    - ticker: SMH
      name: 半导体ETF
    - ticker: SOXX
      name: 半导体ETF
    - ticker: ARKK
      name: 创新成长
    - ticker: KWEB
      name: 中概互联网

  key_stocks:
    - ticker: AAPL
      name: 苹果
      theme: 科技龙头
    - ticker: MSFT
      name: 微软
      theme: AI软件
    - ticker: NVDA
      name: 英伟达
      theme: AI算力
    - ticker: GOOGL
      name: Alphabet
      theme: AI应用
    - ticker: AMZN
      name: 亚马逊
      theme: 云计算/消费
    - ticker: META
      name: Meta
      theme: AI广告
    - ticker: TSLA
      name: 特斯拉
      theme: 电动车/机器人
    - ticker: AVGO
      name: 博通
      theme: AI网络/ASIC
    - ticker: AMD
      name: AMD
      theme: AI芯片
    - ticker: MU
      name: 美光
      theme: AI存储/HBM
    - ticker: MRVL
      name: Marvell
      theme: AI网络/ASIC
    - ticker: ARM
      name: Arm
      theme: AI芯片IP
    - ticker: SNOW
      name: Snowflake
      theme: AI数据云
    - ticker: NOW
      name: ServiceNow
      theme: AI软件/SaaS
