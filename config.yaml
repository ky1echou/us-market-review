# us-market-review 默认配置
# 所有字段均可直接编辑；无需维护 JSON。

app:
  timezone: Asia/Shanghai
  output_dir: reports
  report_language: zh-CN

market:
  # 默认先用 FMP；如果 .env 里没有 FMP_API_KEY，程序会自动跳过 FMP。
  # 后续依次 fallback 到 Stooq、yfinance、本地缓存。
  market_data_provider_order:
    - fmp
    - stooq
    - yfinance
    - cache
  # Backward-compatible alias for older code paths.
  provider_chain:
    - fmp
    - stooq
    - yfinance
    - cache

  provider_options:
    fmp:
      # 这里只写环境变量名，不写真实 API key。
      api_key_env: FMP_API_KEY
      quote_batch_size: 80
      timeout: 20
      symbol_map:
        SPY: SPY
        QQQ: QQQ
        DIA: DIA
        IWM: IWM
        SMH: SMH
        SOXX: SOXX
        XLK: XLK
        XLF: XLF
        XLE: XLE
        XLV: XLV
        TLT: TLT
        GLD: GLD
        USO: USO
        NVDA: NVDA
        MSFT: MSFT
        AAPL: AAPL
        AMZN: AMZN
        GOOGL: GOOGL
        META: META
        TSLA: TSLA
        AMD: AMD
        AVGO: AVGO
        MU: MU
        MRVL: MRVL
        ARM: ARM
        SNOW: SNOW
        NOW: NOW
    stooq:
      # Stooq 备用源代码映射。指数优先用 ETF 替代，降低指数代码不稳定对成功率的影响。
      symbol_map:
        ^GSPC: spy.us
        ^IXIC: qqq.us
        ^DJI: dia.us
        ^RUT: iwm.us
        ^SOX: smh.us
        ^VIX: ^vix
        ^TNX: 10usy.b
        SPY: spy.us
        QQQ: qqq.us
        DIA: dia.us
        IWM: iwm.us
        SMH: smh.us
        SOXX: soxx.us
        XLK: xlk.us
        XLF: xlf.us
        XLE: xle.us
        XLV: xlv.us
        TLT: tlt.us
        GLD: gld.us
        USO: uso.us
        NVDA: nvda.us
        MSFT: msft.us
        AAPL: aapl.us
        AMZN: amzn.us
        GOOGL: googl.us
        META: meta.us
        TSLA: tsla.us
        AMD: amd.us
        AVGO: avgo.us
        MU: mu.us
        MRVL: mrvl.us
        ARM: arm.us
        SNOW: snow.us
        NOW: now.us
    twelve_data:
      api_key_env: TWELVE_DATA_API_KEY
    alpha_vantage:
      api_key_env: ALPHA_VANTAGE_API_KEY
    polygon:
      api_key_env: POLYGON_API_KEY

  period: 90d
  provider_check_period: 30d
  interval: 1d

  request_delay_sec: 1.0
  retry_count: 1
  retry_backoff_sec: 4.0

  cache_dir: data/processed/market_cache
  cache_snapshot_path: data/processed/market_cache.json
  cache_max_age_hours: 168
  cache_max_trading_days: 3

  # 行情可用率低于该阈值时，不生成正式 Markdown/PDF，只推送失败提示。
  min_success_ratio: 0.7

  # 第一阶段正式报告只抓 MVP 核心池，避免覆盖过宽拖垮成功率。
  benchmarks:
    - ticker: SPY
      name: 标普500ETF
    - ticker: QQQ
      name: 纳斯达克100ETF
    - ticker: DIA
      name: 道琼斯ETF
    - ticker: IWM
      name: 罗素2000ETF

  sector_etfs:
    - ticker: SMH
      name: 半导体ETF
    - ticker: SOXX
      name: 半导体ETF
    - ticker: XLK
      name: 科技
    - ticker: XLF
      name: 金融
    - ticker: XLE
      name: 能源
    - ticker: XLV
      name: 医疗保健

  key_stocks:
    - ticker: NVDA
      name: 英伟达
      theme: AI算力
    - ticker: MSFT
      name: 微软
      theme: AI软件
    - ticker: AAPL
      name: 苹果
      theme: 科技龙头
    - ticker: AMZN
      name: 亚马逊
      theme: 云计算/消费
    - ticker: GOOGL
      name: Alphabet
      theme: AI应用
    - ticker: META
      name: Meta
      theme: AI广告
    - ticker: TSLA
      name: 特斯拉
      theme: 电动车/机器人
    - ticker: AMD
      name: AMD
      theme: AI芯片
    - ticker: AVGO
      name: 博通
      theme: AI网络/ASIC
    - ticker: MU
      name: 美光
      theme: AI存储/HBM
    - ticker: MRVL
      name: Marvell
      theme: AI网络/ASIC
    - ticker: ARM
      name: Arm
      theme: AI芯片IP
    - ticker: SNOW
      name: Snowflake
      theme: AI数据云
    - ticker: NOW
      name: ServiceNow
      theme: AI软件/SaaS

  macro_assets:
    - ticker: TLT
      name: 20年期以上美债ETF
    - ticker: GLD
      name: 黄金ETF
    - ticker: USO
      name: 原油ETF

news:
  lookback_hours: 36
  max_items_per_feed: 20
  request_timeout_sec: 15
  user_agent: us-market-review/0.1
  feeds:
    - name: Yahoo Finance
      url: https://finance.yahoo.com/news/rssindex
    - name: CNBC Markets
      url: https://www.cnbc.com/id/100003114/device/rss/rss.html
    - name: CNBC Economy
      url: https://www.cnbc.com/id/20910258/device/rss/rss.html
    - name: MarketWatch Top Stories
      url: https://feeds.content.dowjones.io/public/rss/mw_topstories
    - name: Nasdaq Markets
      url: https://www.nasdaq.com/feed/rssoutbound?category=Markets

ah_mapping:
  - us_ticker: NVDA
    us_name: 英伟达
    theme: AI算力
    mapping_strength: 强映射
    a_h_mapping: 光模块、PCB、服务器、液冷、算力租赁、半导体设备
    watch_points: 关注美股AI芯片与半导体ETF对A股算力链情绪映射
  - us_ticker: AMD
    us_name: AMD
    theme: AI芯片
    mapping_strength: 强映射
    a_h_mapping: GPU产业链、先进封装、服务器
    watch_points: 关注AI芯片竞争格局和数据中心需求
  - us_ticker: AVGO
    us_name: 博通
    theme: AI网络/ASIC
    mapping_strength: 强映射
    a_h_mapping: 交换机、光通信、ASIC、PCB
    watch_points: 关注AI网络和定制芯片需求
  - us_ticker: MU
    us_name: 美光
    theme: AI存储/HBM
    mapping_strength: 强映射
    a_h_mapping: 存储、HBM、半导体材料设备
    watch_points: 关注AI服务器存储需求对存储链映射
  - us_ticker: MRVL
    us_name: Marvell
    theme: AI网络/ASIC
    mapping_strength: 强映射
    a_h_mapping: 光通信、交换芯片、ASIC、PCB
    watch_points: 关注AI网络链弹性
  - us_ticker: MSFT
    us_name: 微软
    theme: 云与AI应用
    mapping_strength: 弱映射
    a_h_mapping: 云计算、软件、AI应用、数据中心
    watch_points: 关注云资本开支和AI商业化
  - us_ticker: GOOGL
    us_name: Alphabet
    theme: AI应用/云
    mapping_strength: 弱映射
    a_h_mapping: AI应用、云计算、广告科技
    watch_points: 关注云增长与AI应用竞争
  - us_ticker: TSLA
    us_name: 特斯拉
    theme: 电动车/机器人
    mapping_strength: 情绪映射
    a_h_mapping: 汽车零部件、机器人、智能驾驶、锂电
    watch_points: 关注交付、价格、FSD与机器人催化

report:
  title: 中文美股复盘报告
  author: AI投研 · 美股版
  top_movers_count: 5
  include_raw_audit_section: false
  pdf:
    enabled: true
    wkhtmltopdf_path: ""
    min_bytes: 5000
