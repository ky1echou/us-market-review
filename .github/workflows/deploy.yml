name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_report:
        description: "Run bash run_daily.sh after deployment"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-us-market-review-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Show commit hash
        run: |
          echo "Deploying commit: ${GITHUB_SHA}"

      - name: Prepare SSH key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SERVER_HOST}" ] || [ -z "${SERVER_USER}" ] || [ -z "${SERVER_SSH_KEY}" ]; then
            echo "::error::Missing one or more required repository secrets: SERVER_HOST, SERVER_USER, SERVER_SSH_KEY"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/us-market-review-deploy-key
          chmod 600 ~/.ssh/us-market-review-deploy-key
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy and install over SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${FMP_API_KEY:-}" ]; then
            echo "::warning::FMP_API_KEY secret is empty or not configured; deployment will keep the existing server .env value if present."
          fi
          if [ -z "${TWELVE_DATA_API_KEY:-}" ]; then
            echo "::warning::TWELVE_DATA_API_KEY secret is empty or not configured; Twelve Data fallback will be skipped unless the server .env already has it."
          fi
          FMP_API_KEY_B64="$(printf '%s' "${FMP_API_KEY:-}" | base64 -w 0)"
          TWELVE_DATA_API_KEY_B64="$(printf '%s' "${TWELVE_DATA_API_KEY:-}" | base64 -w 0)"

          ssh \
            -i ~/.ssh/us-market-review-deploy-key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "${SERVER_USER}@${SERVER_HOST}" "FMP_API_KEY_B64='${FMP_API_KEY_B64}' TWELVE_DATA_API_KEY_B64='${TWELVE_DATA_API_KEY_B64}' bash -s" <<'REMOTE'
          set -euo pipefail

          cd /opt/us-market-review

          echo "Server current commit before deploy:"
          git rev-parse HEAD || true

          cp .env /tmp/us-market-review.env.bak || true
          git fetch origin
          git reset --hard origin/main
          cp /tmp/us-market-review.env.bak .env || true

          upsert_env_secret() {
            key_name="$1"
            encoded_value="$2"
            if [ -z "${encoded_value:-}" ]; then
              echo "${key_name} secret is empty; existing server .env is left unchanged."
              return 0
            fi

            decoded_value="$(printf '%s' "${encoded_value}" | base64 -d)"
            if [ -z "${decoded_value}" ]; then
              echo "${key_name} secret decoded to an empty value; existing server .env is left unchanged."
              return 0
            fi

            touch .env
            tmp_env="$(mktemp)"
            awk -v name="${key_name}" -v value="${decoded_value}" '
              BEGIN { updated = 0 }
              index($0, name "=") == 1 { print name "=" value; updated = 1; next }
              { print }
              END { if (updated == 0) print name "=" value }
            ' .env > "${tmp_env}"
            cat "${tmp_env}" > .env
            rm -f "${tmp_env}"
            unset decoded_value
            echo "${key_name} has been written to server .env"
          }

          upsert_env_secret "FMP_API_KEY" "${FMP_API_KEY_B64:-}"
          upsert_env_secret "TWELVE_DATA_API_KEY" "${TWELVE_DATA_API_KEY_B64:-}"
          unset FMP_API_KEY_B64 TWELVE_DATA_API_KEY_B64

          for key_name in FMP_API_KEY TWELVE_DATA_API_KEY; do
            if grep -q "^${key_name}=" .env; then
              key_len="$(awk -F= -v name="${key_name}" 'index($0, name "=") == 1 { print length(substr($0, index($0,"=")+1)); exit }' .env)"
              if [ "${key_len:-0}" -gt 0 ]; then
                echo "Confirmed ${key_name} exists in server .env; length=${key_len}"
              else
                echo "::warning::${key_name} line exists in server .env but is empty."
              fi
            else
              echo "::warning::${key_name} is not present in server .env."
            fi
          done

          bash scripts/install_ubuntu.sh
          REMOTE

      - name: Health check over SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/us-market-review-deploy-key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "${SERVER_USER}@${SERVER_HOST}" 'bash -s' <<'REMOTE'
          set -euo pipefail

          cd /opt/us-market-review
          if [ -x ".venv/bin/python" ]; then
            PYTHON_BIN=".venv/bin/python"
          else
            PYTHON_BIN="python3"
          fi

          "$PYTHON_BIN" -m src.health_check --config config.yaml
          set +e
          "$PYTHON_BIN" -m src.provider_check --provider fmp --symbols AAPL,MSFT,NVDA --config config.yaml
          fmp_provider_status=$?
          if grep -q '^TWELVE_DATA_API_KEY=.' .env; then
            "$PYTHON_BIN" -m src.provider_check --provider twelve_data --symbols AAPL,MSFT,NVDA --config config.yaml
            twelve_provider_status=$?
          else
            echo "::notice::TWELVE_DATA_API_KEY is not configured on the server; Twelve Data provider_check skipped."
            twelve_provider_status=0
          fi
          set -e
          if [ "${fmp_provider_status}" -ne 0 ]; then
            echo "::warning::FMP provider_check failed. Review the diagnostic output above and logs/provider_check.log."
          fi
          if [ "${twelve_provider_status}" -ne 0 ]; then
            echo "::warning::Twelve Data provider_check failed. Review the diagnostic output above and logs/provider_check.log."
          fi
          echo "Recent provider check log:"
          tail -n 120 logs/provider_check.log || true
          echo "Recent server log:"
          tail -n 80 logs/daily.log || true
          REMOTE

      - name: Run report manually over SSH
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_report == 'true' }}
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/us-market-review-deploy-key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "${SERVER_USER}@${SERVER_HOST}" 'bash -s' <<'REMOTE'
          set -euo pipefail

          cd /opt/us-market-review
          set +e
          bash run_daily.sh
          run_status=$?
          set -e

          echo "Recent server log:"
          tail -n 120 logs/daily.log || true

          if grep -E "PDF 生成失败|行情数据抓取失败或不足|行情质量警告" logs/daily.log | tail -n 20; then
            echo "::warning::Report run finished with warnings. Check logs/daily.log on the server."
          fi

          exit "${run_status}"
          REMOTE
